services:
  db-cdev:
    image: postgres:15-alpine
    container_name: central-db-cdev
    environment:
      - POSTGRES_USER=johndoe
      - POSTGRES_PASSWORD=randompassword
      - POSTGRES_DB=central_db_cdev
    ports:
      - "5433:5432" # Porta externa alternativa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d central_db_cdev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: central-produto-web-cdev
    env_file:
      - cdev.env
    depends_on:
      db-cdev:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db-cdev:5432/central_db_cdev?schema=public
      - DIRECT_URL=postgresql://johndoe:randompassword@db-cdev:5432/central_db_cdev?schema=public
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - BYPASS_AUTH=false
    restart: always
